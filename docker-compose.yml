services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    volumes:
      - faiss_index:/app/rag/faiss_index
      - mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  api-full:
    build: .
    profiles: ["gpu"]
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - RAG_LIGHTWEIGHT=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  faiss_index:
  mlruns:
