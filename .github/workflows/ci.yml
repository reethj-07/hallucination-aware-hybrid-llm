name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RAG_RERANK: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests with coverage
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pytest --cov=api --cov=rag --cov-report=xml --cov-fail-under=65

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy .

      - name: Build production knowledge base
        run: |
          mkdir -p data/rag_docs rag/faiss_index
          python scripts/generate_production_docs.py
          python -m rag.ingest_docs --force-reingest

      - name: Evaluate retrieval performance
        run: python scripts/evaluate_retrieval.py
